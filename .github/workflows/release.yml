name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.3.0). Leave blank to dry-run build only.
        required: false
        default: ''

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: kya-agent-linux-x86_64-musl
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: kya-agent-linux-aarch64-musl
            cross: true
          # x86_64-apple-darwin (Intel Mac) intentionally NOT in the
          # matrix. macos-13 runners stall ~15-20 min on this build per
          # repeated CI runs, and the awp / kya user base is dominated by
          # Linux-in-Docker plus Apple Silicon Macs. Intel Mac users can
          # `cargo install --git https://github.com/GhostClaw-dev/kya-skill`
          # locally (Rust toolchain required) — install.sh surfaces a
          # clear message pointing them there.
          - os: macos-14
            target: aarch64-apple-darwin
            asset: kya-agent-darwin-aarch64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: kya-agent-windows-x86_64.exe
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/kya-agent ${{ matrix.asset }}
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/kya-agent.exe ${{ matrix.asset }}
          (Get-FileHash ${{ matrix.asset }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.asset }}" | Out-File -Encoding ascii ${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kya-agent-*
          generate_release_notes: true
          fail_on_unmatched_files: true
